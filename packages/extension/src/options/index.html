<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Signet — Settings</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --sig-bg: #08080a;
      --sig-surface: #0e0e12;
      --sig-surface-raised: #151519;
      --sig-border: rgba(255, 255, 255, 0.06);
      --sig-border-strong: rgba(255, 255, 255, 0.12);
      --sig-text: #d4d4d8;
      --sig-text-bright: #f0f0f2;
      --sig-text-muted: #6b6b76;
      --sig-accent: #8a8a96;
      --sig-accent-hover: #c0c0c8;
      --sig-success: #4a7a5e;
      --sig-danger: #8a4a48;
      --ease: cubic-bezier(0.16, 1, 0.3, 1);
      --dur: 0.2s;
    }

    [data-theme="light"] {
      --sig-bg: #e4dfd8;
      --sig-surface: #dbd5cd;
      --sig-surface-raised: #d1cbc2;
      --sig-border: rgba(0, 0, 0, 0.06);
      --sig-border-strong: rgba(0, 0, 0, 0.12);
      --sig-text: #2a2a2e;
      --sig-text-bright: #0a0a0c;
      --sig-text-muted: #7a756e;
      --sig-accent: #6a6660;
      --sig-accent-hover: #3a3832;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      background: var(--sig-bg);
      color: var(--sig-text);
      font-family: "IBM Plex Mono", monospace;
      font-size: 13px;
      line-height: 1.55;
      -webkit-font-smoothing: antialiased;
    }

    .container {
      max-width: 480px;
      margin: 48px auto;
      padding: 0 24px;
    }

    h1 {
      font-family: "Chakra Petch", sans-serif;
      font-size: 1.5rem;
      font-weight: 600;
      color: var(--sig-text-bright);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 32px;
    }

    .field {
      margin-bottom: 24px;
    }

    .field-label {
      display: block;
      font-size: 10px;
      color: var(--sig-text-muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 6px;
    }

    .field-hint {
      font-size: 11px;
      color: var(--sig-text-muted);
      margin-top: 4px;
    }

    input[type="text"],
    input[type="password"] {
      width: 100%;
      padding: 6px 10px;
      background: var(--sig-surface-raised);
      border: 1px solid var(--sig-border-strong);
      color: var(--sig-text);
      font-family: "IBM Plex Mono", monospace;
      font-size: 13px;
      outline: none;
      transition: border-color var(--dur) var(--ease);
    }

    input[type="text"]:focus,
    input[type="password"]:focus {
      border-color: var(--sig-accent);
    }

    select {
      width: 100%;
      padding: 6px 10px;
      background: var(--sig-surface-raised);
      border: 1px solid var(--sig-border-strong);
      color: var(--sig-text);
      font-family: "IBM Plex Mono", monospace;
      font-size: 13px;
      outline: none;
      cursor: pointer;
      -webkit-appearance: none;
      appearance: none;
    }

    .actions {
      display: flex;
      gap: 8px;
      margin-top: 32px;
    }

    .btn {
      padding: 6px 16px;
      font-family: "IBM Plex Mono", monospace;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      cursor: pointer;
      border: 1px solid var(--sig-border-strong);
      background: var(--sig-text-bright);
      color: var(--sig-bg);
      transition: all var(--dur) var(--ease);
    }

    .btn:hover {
      background: var(--sig-accent-hover);
    }

    .saved-msg {
      font-size: 11px;
      color: var(--sig-success);
      text-transform: uppercase;
      letter-spacing: 0.04em;
      opacity: 0;
      transition: opacity var(--dur) var(--ease);
      align-self: center;
    }

    .saved-msg.visible {
      opacity: 1;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Signet Settings</h1>

    <div class="field">
      <label class="field-label" for="daemon-url">Daemon URL</label>
      <input type="text" id="daemon-url" placeholder="http://localhost:3850">
      <div class="field-hint">The Signet daemon HTTP address</div>
    </div>

    <div class="field">
      <label class="field-label" for="auth-token">Auth Token</label>
      <input type="password" id="auth-token" placeholder="Optional — for team/hybrid mode">
      <div class="field-hint">Required only if daemon runs in team or hybrid auth mode</div>
    </div>

    <div class="field">
      <label class="field-label" for="theme">Theme</label>
      <select id="theme">
        <option value="auto">Auto (follow browser)</option>
        <option value="dark">Dark</option>
        <option value="light">Light</option>
      </select>
    </div>

    <div class="actions">
      <button class="btn" id="save-btn">Save</button>
      <span class="saved-msg" id="saved-msg">Saved</span>
    </div>
  </div>

  <script type="module" src="options.js"></script>
</body>
</html>
