name: Docker Smoke

on:
  pull_request:
    paths:
      - "deploy/docker/**"
      - "packages/**"
      - "scripts/**"
      - "public/**"
      - "web/**"
      - "package.json"
      - "bun.lock"
      - "bunfig.toml"
      - "tsconfig*.json"
      - "biome.json"
      - "README.md"
      - "AGENTS.md"
      - "CLAUDE.md"
      - "LICENSE"
  push:
    branches:
      - main
    paths:
      - "deploy/docker/**"
      - "packages/**"
      - "scripts/**"
      - "public/**"
      - "web/**"
      - "package.json"
      - "bun.lock"
      - "bunfig.toml"
      - "tsconfig*.json"
      - "biome.json"
      - "README.md"
      - "AGENTS.md"
      - "CLAUDE.md"
      - "LICENSE"

permissions:
  contents: read

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build and start stack
        run: |
          SIGNET_HTTP_PORT=8080 SIGNET_HTTPS_PORT=8443 docker compose -f deploy/docker/compose.yml up -d --build

      - name: Wait for /health through proxy
        run: |
          for _ in $(seq 1 40); do
            if curl -fsS http://127.0.0.1:8080/health >/dev/null; then
              exit 0
            fi
            sleep 3
          done
          echo "health endpoint did not become ready"
          docker compose -f deploy/docker/compose.yml logs
          exit 1

      - name: Stop stack
        if: always()
        run: docker compose -f deploy/docker/compose.yml down -v
