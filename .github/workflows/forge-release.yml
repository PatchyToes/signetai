name: Forge Release

on:
  push:
    branches: [main]
    paths:
      - 'packages/forge/**'
      - '.github/workflows/forge-release.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      skip: ${{ steps.meta.outputs.skip }}
      version: ${{ steps.meta.outputs.version }}
      tag: ${{ steps.meta.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: meta
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          EVENT_NAME: ${{ github.event_name }}
          EVENT_BEFORE: ${{ github.event.before }}
        run: |
          set -euo pipefail
          VERSION=$(jq -r '.version' packages/forge/forge-version.json)
          TAG="forge-v${VERSION}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          if gh release view "${TAG}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            if [[ "${EVENT_NAME}" == "push" && -n "${EVENT_BEFORE}" && "${EVENT_BEFORE}" != "0000000000000000000000000000000000000000" ]]; then
              CHANGED_FORGE_FILES=$(git diff --name-only "${EVENT_BEFORE}" "${GITHUB_SHA}" -- 'packages/forge/**' || true)
              CHANGED_NON_VERSION_FILES=$(printf '%s\n' "${CHANGED_FORGE_FILES}" | grep -E '^packages/forge/' | grep -v '^packages/forge/forge-version.json$' || true)
              VERSION_FILE_CHANGED=$(printf '%s\n' "${CHANGED_FORGE_FILES}" | grep -E '^packages/forge/forge-version.json$' || true)
              if [[ -n "${CHANGED_NON_VERSION_FILES}" && -z "${VERSION_FILE_CHANGED}" ]]; then
                echo "::error::Forge source changed without a packages/forge/forge-version.json bump, but ${TAG} is already released. Bump Forge's version before merging Forge source changes to main."
                printf '%s\n' "${CHANGED_NON_VERSION_FILES}"
                exit 1
              fi
            fi
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "skip=false" >> "$GITHUB_OUTPUT"

  build:
    needs: prepare
    if: needs.prepare.outputs.skip != 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            asset: forge-macos-arm64.tar.gz
          - os: macos-latest
            target: x86_64-apple-darwin
            asset: forge-macos-x64.tar.gz
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            asset: forge-linux-x64.tar.gz
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            asset: forge-linux-arm64.tar.gz
            linker: aarch64-linux-gnu-gcc
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Install Linux ARM64 cross toolchain
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu libc6-dev-arm64-cross
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: packages/forge
          key: forge-${{ matrix.target }}
      - name: Assert rustls-only TLS stack
        shell: bash
        working-directory: packages/forge
        run: |
          set -euo pipefail
          if cargo tree -i openssl-sys -e features --target "$RELEASE_TARGET" >/tmp/openssl-tree.log 2>&1; then
            echo "::error::Forge includes openssl-sys in the dependency graph for target $RELEASE_TARGET. Keep Forge on rustls-only reqwest features for portable cross-builds."
            cat /tmp/openssl-tree.log
            exit 1
          fi
          if cargo tree -i native-tls -e features --target "$RELEASE_TARGET" >/tmp/native-tls-tree.log 2>&1; then
            echo "::error::Forge includes native-tls in the dependency graph for target $RELEASE_TARGET. Keep Forge on rustls-only reqwest features for portable cross-builds."
            cat /tmp/native-tls-tree.log
            exit 1
          fi
        env:
          RELEASE_TARGET: ${{ matrix.target }}
      - name: Build Forge
        shell: bash
        working-directory: packages/forge
        run: cargo build --release --no-default-features --target "$RELEASE_TARGET"
        env:
          RELEASE_TARGET: ${{ matrix.target }}
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: ${{ matrix.linker }}
          CC_aarch64_unknown_linux_gnu: ${{ matrix.linker }}
      - name: Package asset
        shell: bash
        run: |
          cp "packages/forge/target/${RELEASE_TARGET}/release/forge" forge
          tar czf "${RELEASE_ASSET}" forge
          shasum -a 256 "${RELEASE_ASSET}" > "${RELEASE_ASSET}.sha256"
        env:
          RELEASE_TARGET: ${{ matrix.target }}
          RELEASE_ASSET: ${{ matrix.asset }}
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: |
            ${{ matrix.asset }}
            ${{ matrix.asset }}.sha256

  release:
    needs: [prepare, build]
    if: needs.prepare.outputs.skip != 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Create GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          FILES=$(find artifacts -type f \( -name '*.tar.gz' -o -name '*.tar.gz.sha256' \) | sort)
          gh release create "${{ needs.prepare.outputs.tag }}" \
            --repo "${GITHUB_REPOSITORY}" \
            --target "${GITHUB_SHA}" \
            --title "Forge v${{ needs.prepare.outputs.version }}" \
            --notes "Forge release from the Signet monorepo (packages/forge)." \
            ${FILES}
