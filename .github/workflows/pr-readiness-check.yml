name: PR Readiness Checklist

on:
  pull_request:
    types: [opened, edited, reopened, synchronize, ready_for_review]

permissions:
  contents: read
  pull-requests: read

jobs:
  readiness-checklist:
    name: Validate mandatory PR checklist
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    steps:
      - name: Check required checklist items
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const labels = (pr.labels || []).map((l) => l.name);
            if (labels.includes("checklist-exception")) {
              core.notice(
                "Bypassing mandatory readiness checklist because PR has label: checklist-exception",
              );
              return;
            }

            const body = pr.body || "";
            const required = [
              "Spec alignment validated (`INDEX.md` + `dependencies.yaml`)",
              "Agent scoping verified on all new/changed data queries",
              "Input/config validation and bounds checks added",
              "Error handling and fallback paths tested (no silent swallow)",
              "Security checks applied to admin/mutation endpoints",
              "Docs updated for API/spec/status changes",
              "Regression tests added for each bug fix",
              "Lint/typecheck/tests pass locally",
            ];

            const missing = required.filter((item) => {
              const escaped = item.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
              const re = new RegExp(`-\\s*\\[[xX]\\]\\s*${escaped}`);
              return !re.test(body);
            });

            if (missing.length > 0) {
              core.setFailed(
                [
                  "Missing required checked PR readiness items:",
                  ...missing.map((m) => `- ${m}`),
                  "",
                  "Please update the PR body checklist in .github/pull_request_template.md.\nTo bypass intentionally, apply label: checklist-exception",
                ].join("\n"),
              );
            }
